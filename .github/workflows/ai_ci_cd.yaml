name: AI Fake Website Detector Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Basic Test
      run: |
        echo "Testing project..."
        python -m py_compile app.py

  sast:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Bandit
      run: pip install bandit

    - name: Run SAST Scan
      run: bandit -r .

  sca:
    runs-on: ubuntu-latest
  
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
  
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
  
    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
  
    - name: Install Safety
      run: pip install safety
  
    - name: Run Dependency Scan
      run: safety scan --no-input

    
  docker:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t fake-website-detector .

  deploy:
    runs-on: ubuntu-latest
    needs: [build-test, sast, sca, docker]

    steps:
    - name: Deploy Step
      run: echo "Deploying application..."
